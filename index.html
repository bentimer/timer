<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таймер зворотного відліку</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    color:#00ff66;
}

.container{
    text-align:center;
    background:#000;
    padding:50px;
}

h1{
   color:#32d74b;
    font-size:2rem;
    font-weight:600;      /* Жирніший текст */
    margin-top:40px;      /* Опускає напис нижче */
    margin-bottom:10px;
    letter-spacing:2px;
}

.timer{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.container{
    text-align:center;
    background:#000;
    padding:50px;
}

.number{
    font-size:5rem;
    font-weight:300;
    color:#00d84a;
    text-shadow:none;
    letter-spacing:2px;
    font-family:"Segoe UI", Arial, sans-serif;
}

.number{
    font-size:5rem;
    font-weight:300;
    color:#00d84a;
    text-shadow:none;
    letter-spacing:2px;
    font-family:"Segoe UI", Arial, sans-serif;
}

.footer{
    margin-top:30px;
    color:#7dffb2;
}
</style>
</head>
<body>

<div class="container">
    <h1>Лишилось</h1>

    <div class="timer">
        <div class="block">
            <div class="number" id="days">0</div>
            <div class="label">Днів</div>
        </div>

        <div class="block">
            <div class="number" id="hours">0</div>
            <div class="label">Годин</div>
        </div>

        <div class="block">
            <div class="number" id="minutes">0</div>
            <div class="label">Хвилин</div>
        </div>

        <div class="block">
            <div class="number" id="seconds">0</div>
            <div class="label">Секунд</div>
        </div>
    </div>

    <div class="footer">
        не так вже й багато
    </div>
</div>

<script>
// Встановіть потрібну дату
const targetDate = new Date("July 12, 2028 00:00:00").getTime();

function updateTimer(){

    const now = new Date().getTime();
    const distance = targetDate - now;

    if(distance <= 0){
        document.querySelector(".container").innerHTML =
        "<h1>🎉 Час настав! 🎉</h1>";
        clearInterval(interval);
        return;
    }

    const days = Math.floor(distance/(1000*60*60*24));
    const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds = Math.floor((distance%(1000*60))/1000);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = String(hours).padStart(2,'0');
    document.getElementById("minutes").textContent = String(minutes).padStart(2,'0');
    document.getElementById("seconds").textContent = String(seconds).padStart(2,'0');
}

updateTimer();
const interval = setInterval(updateTimer,1000);
</script>

</body>
</html>
